name: Release

on:
  workflow_dispatch:
    inputs:
      mode: { description: "rc = prerelease; release = final", type: choice, options: [rc, release], default: rc }
      bump: { description: "Bump latest final release", type: choice, options: [patch, minor, major, none], default: patch }

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: read

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      VER_NAME: ${{ steps.ver.outputs.VER_NAME }}
      VER_CODE: ${{ steps.ver.outputs.VER_CODE }}
      TAG: ${{ steps.ver.outputs.TAG }}
      PRERELEASE: ${{ steps.ver.outputs.PRERELEASE }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Resolve version
        id: ver
        env:
          MODE: ${{ inputs.mode }}
          BUMP: ${{ inputs.bump }}
        run: bash scripts/version.sh resolve "$MODE" "$BUMP" >> "$GITHUB_OUTPUT"
      - name: Fail if tag already exists
        env:
          TAG: ${{ steps.ver.outputs.TAG }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG already exists" >&2; exit 1
          fi

  build:
    needs: version
    uses: ./.github/workflows/build.yml
    secrets: inherit
    with:
      ver_name: ${{ needs.version.outputs.VER_NAME }}
      ver_code: ${{ needs.version.outputs.VER_CODE }}

  publish:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: wgshare-${{ needs.version.outputs.VER_NAME }}
          path: dist
      - name: Create tag
        env:
          TAG: ${{ needs.version.outputs.TAG }}
        run: |
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.TAG }}
          name: ${{ needs.version.outputs.TAG }}
          prerelease: ${{ needs.version.outputs.PRERELEASE == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/wgshare-*.apk
            dist/swiftkey-revanced-*.zip
            dist/kdeconnect-revanced-*.zip
            dist/SHA256SUMS