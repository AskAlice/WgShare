name: Build

on:
  workflow_call:
    inputs:
      ver_name: { description: "Version name", required: true, type: string }
      ver_code: { description: "Version code", required: true, type: string }
    outputs:
      artifact:
        description: "Uploaded build artifact name"
        value: wgshare-${{ inputs.ver_name }}
  workflow_dispatch:
    inputs:
      ver_name: { description: "Version name", type: string, default: "0.0.0-dev" }
      ver_code: { description: "Version code", type: string, default: "1" }

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "17" }
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0" "platforms;android-34"
      - name: Install apkeep
        run: |
          url=$(curl -fsSL https://api.github.com/repos/EFForg/apkeep/releases/latest \
            | grep -oE 'https://[^"]+apkeep-x86_64-unknown-linux-gnu' | head -n1)
          sudo curl -fsSL -o /usr/local/bin/apkeep "$url"
          sudo chmod +x /usr/local/bin/apkeep
          apkeep --version
      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.ks"
          else
            echo "WARN: KEYSTORE_B64 secret not set; build will be debug-signed and patching will be skipped" >&2
          fi
      - name: Build + patch + sign
        env:
          VER_NAME: ${{ inputs.ver_name }}
          VER_CODE: ${{ inputs.ver_code }}
          KEYSTORE: ${{ runner.temp }}/release.ks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
          ORG_GRADLE_PROJECT_githubPackagesUsername: ${{ github.actor }}
          ORG_GRADLE_PROJECT_githubPackagesPassword: ${{ secrets.GH_PACKAGES_TOKEN }}
        run: bash scripts/build-release.sh
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wgshare-${{ inputs.ver_name }}
          if-no-files-found: error
          path: |
            dist/wgshare-*.apk
            dist/swiftkey-revanced-*.zip
            dist/kdeconnect-revanced-*.zip
            dist/SHA256SUMS